syntax = "proto3";

package logfriends;

option java_multiple_files = true;
option java_package = "com.logfriends.agent.proto";
option java_outer_classname = "LogFriendsProto";
option go_package = "github.com/log-friends/agent/collector/proto";

message LogEvent {
  string timestamp   = 1;
  string level       = 2;
  string logger_name = 3;
  string thread_name = 4;
  string message     = 5;
  string trace_id    = 6;
  string span_id     = 7;
  string exception   = 8;
  map<string, string> mdc = 9;
}

message HttpEvent {
  string timestamp   = 1;
  string method      = 2;
  string uri         = 3;
  int32  status_code = 4;
  int64  duration_ms = 5;
  string trace_id    = 6;
  map<string, string> headers = 7;
  string exception_stack = 8;
  map<string, string> request_headers = 9;
}

// 내부 이벤트 모델의 최상위 래퍼.
// 현재 SDK 전송 포맷은 Protobuf가 아니라 HTTP JSON POST /ingest 이다.
message AgentMessage {
  string worker_id = 1;

  oneof payload {
    HandshakePayload handshake = 2;
    BatchPayload     batch     = 3;
  }
}

// 1차 런타임 경로에서는 자동 워커 등록에 사용하지 않는다.
message HandshakePayload {
  string           worker_name = 1;
  repeated SpecDef specs       = 2;
  int32            http_port   = 3;
}

// 로그 스펙 정의 (LogSpec.define() 빌더 결과)
message SpecDef {
  string            name        = 1;
  string            description = 2;
  repeated string   levels      = 3;
  string            category    = 4;
  repeated FieldDef fields      = 5;
}

// 로그 필드 정의
message FieldDef {
  string name        = 1;
  string type        = 2;
  bool   required    = 3;
  string example     = 4;
  string description = 5;
}

// 내부 배치 표현. 실제 전송 시에는 JSON으로 직렬화한다.
message BatchPayload {
  repeated AgentEvent events = 1;
}

// JDBC 쿼리 캡처
message JdbcEvent {
  string timestamp       = 1;
  string sql             = 2;
  int64  duration_ms     = 3;
  int32  row_count       = 4;
  string trace_id        = 5;
  string exception       = 6;
  string exception_stack = 7;
}

// @Service 메서드 실행 시간 (10ms 이상만)
message MethodTraceEvent {
  string timestamp       = 1;
  string class_name      = 2;
  string method_name     = 3;
  int64  duration_ms     = 4;
  string trace_id        = 5;
  string exception       = 6;
  string exception_stack = 7;
}

// 배치 내 단일 이벤트
message AgentEvent {
  oneof event {
    LogEvent          log          = 1;
    HttpEvent         http         = 2;
    LogEventCapture   log_event    = 3;
    JdbcEvent         jdbc         = 4;
    MethodTraceEvent  method_trace = 5;
  }
}

// @LogEvent 메서드 인자 자동 캡처 결과
message LogEventCapture {
  string              timestamp  = 1;
  string              event_name = 2;
  map<string, string> fields     = 3;
}
